app = "boring-ui-frontend-agent"
primary_region = "cdg"

[build]
  dockerfile = "../shared/Dockerfile.backend"

[env]
  APP_ENV = "production"
  AGENTS_MODE = "frontend"
  CONTROL_PLANE_PROVIDER = "neon"
  CONTROL_PLANE_APP_ID = "boring-ui"
  AUTH_SESSION_SECURE_COOKIE = "true"

[http_service]
  internal_port = 8000
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "off"
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    grace_period = "20s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
