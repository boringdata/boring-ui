# Fly.io config for TypeScript backend deployment
# Uses Dockerfile.ts-backend (Fastify + tRPC + Drizzle)

app = "boring-ui-frontend-agent"
primary_region = "cdg"

[build]
  dockerfile = "../../deploy/shared/Dockerfile.ts-backend"

[env]
  PORT = "8000"
  NODE_ENV = "production"
  WORKSPACE_BACKEND = "bwrap"
  AGENT_RUNTIME = "pi"
  AGENT_PLACEMENT = "browser"
  CONTROL_PLANE_PROVIDER = "neon"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
